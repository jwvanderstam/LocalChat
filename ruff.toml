target-version = "py311"

[lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",    # line-too-long — handled by reviewer judgment, not enforced
    "E402",    # module-import-not-at-top — intentional in several modules
    "F401",    # unused-import — many re-exports; fix separately
    "F811",    # redefined-while-unused — conditional imports pattern
    "F841",    # unused-variable — fix separately
    "UP035",   # deprecated-import — large batch; fix separately
    "UP028",   # yield-in-for-loop — fix separately
    "SIM105",  # suppressible-exception — explicit pass is intentional in places
    "SIM117",  # multiple-with-statements — readability preference
    "SIM103",  # needless-bool — fix separately
    "SIM222",  # expr-or-true — fix separately
    "B007",    # unused-loop-control-variable — fix separately
    "B017",    # assert-raises-exception — fix separately
    "B023",    # function-uses-loop-variable — fix separately
    "B904",    # raise-without-from — fix separately
    "B905",    # zip-without-explicit-strict — fix separately
    "B018",    # useless-expression — fix separately
    "E722",    # bare-except — fix separately
]

[lint.per-file-ignores]
"tests/**" = ["S101"]  # allow assert in tests
