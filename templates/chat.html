{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
    <h1 class="h2">Chat Interface</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <div class="form-check form-switch me-3 align-self-center">
            <input class="form-check-input" type="checkbox" id="rag-toggle" checked>
            <label class="form-check-label" for="rag-toggle">
                <i class="bi bi-database me-1"></i>RAG Mode
            </label>
        </div>
        <div class="form-check form-switch me-3 align-self-center">
            <input class="form-check-input" type="checkbox" id="enhance-toggle">
            <label class="form-check-label" for="enhance-toggle">
                <i class="bi bi-globe me-1"></i>Enhanced
            </label>
        </div>
        <div class="d-flex align-items-center me-3" style="min-width: 200px;">
            <i class="bi bi-thermometer-half me-1 text-muted" title="Temperature"></i>
            <div class="flex-grow-1">
                <div class="d-flex justify-content-between" style="font-size: 0.7rem; color: #6c757d; line-height: 1;">
                    <span>Precise</span>
                    <span id="temperature-value" class="fw-semibold text-primary">0.7</span>
                    <span>Creative</span>
                </div>
                <input type="range" class="form-range" id="temperature-slider"
                       min="0" max="2" step="0.1" value="0.7"
                       title="Temperature: controls randomness. Low = focused answers, High = creative responses.">
            </div>
        </div>
        <button class="btn btn-sm btn-outline-primary me-2" id="copy-chat-btn" title="Copy chat to clipboard">
            <i class="bi bi-clipboard me-1"></i>Copy Chat
        </button>
        <button class="btn btn-sm btn-outline-secondary" id="new-chat-header-btn" title="Start a new conversation">
            <i class="bi bi-plus-circle me-1"></i>New Chat
        </button>
    </div>
</div>

<div class="row g-2" style="height: calc(100vh - 210px);">

    <!-- Conversations Sidebar -->
    <div class="col-md-3 col-lg-2 d-none d-md-flex flex-column">
        <div class="d-flex flex-column h-100 border rounded bg-white overflow-hidden">
            <div class="p-2 border-bottom bg-light">
                <button class="btn btn-primary btn-sm w-100 mb-1" id="new-chat-btn">
                    <i class="bi bi-plus-circle me-1"></i>New Chat
                </button>
                <button class="btn btn-outline-danger btn-sm w-100" id="clear-history-btn">
                    <i class="bi bi-trash me-1"></i>Clear All History
                </button>
            </div>
            <div id="conversations-list" class="flex-grow-1 overflow-auto">
                <div class="text-center text-muted py-4" id="conversations-placeholder">
                    <div class="spinner-border spinner-border-sm" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Panel -->
    <div class="col-12 col-md-9 col-lg-10 d-flex flex-column">
        <div class="card flex-grow-1 h-100">
            <div class="card-body d-flex flex-column p-2 p-md-3">
                <!-- Chat Messages Area -->
                <div id="chat-messages" class="flex-grow-1 overflow-auto mb-2 p-3 border rounded bg-light">
                    <div class="text-center text-muted" id="chat-empty-state">
                        <i class="bi bi-chat-dots fs-1"></i>
                        <p class="mt-2">Start a conversation...</p>
                        <p class="small">
                            <span class="badge bg-primary" id="mode-badge">RAG Mode: ON</span>
                        </p>
                    </div>
                </div>

                <!-- Input Area -->
                <form id="chat-form" class="d-flex gap-2">
                    <input type="text" class="form-control" id="chat-input"
                           placeholder="Type your message..." autocomplete="off">
                    <button type="submit" class="btn btn-primary" id="send-btn">
                        <i class="bi bi-send"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Message Templates -->
<template id="user-message-template">
    <div class="message user-message mb-3">
        <div class="d-flex justify-content-end">
            <div class="message-content bg-primary text-white p-3 rounded" style="max-width: 75%;">
                <div class="message-text"></div>
                <small class="message-time text-white-50 d-block mt-1"></small>
            </div>
        </div>
    </div>
</template>

<template id="assistant-message-template">
    <div class="message assistant-message mb-3">
        <div class="d-flex">
            <div class="message-content bg-white border p-3 rounded" style="max-width: 75%;">
                <div class="message-text"></div>
                <small class="message-time text-muted d-block mt-1"></small>
            </div>
        </div>
    </div>
</template>

<template id="loading-template">
    <div class="message loading-message mb-3">
        <div class="d-flex">
            <div class="message-content bg-white border p-3 rounded">
                <div class="spinner-border spinner-border-sm me-2" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <span class="text-muted">Thinking...</span>
            </div>
        </div>
    </div>
</template>

<!-- Rename Conversation Modal -->
<div class="modal fade" id="renameModal" tabindex="-1" aria-labelledby="renameModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header py-2">
                <h6 class="modal-title" id="renameModalLabel">Rename Conversation</h6>
                <button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pb-2">
                <input type="text" class="form-control form-control-sm" id="rename-input"
                       placeholder="Conversation title" maxlength="255">
            </div>
            <div class="modal-footer py-2">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary btn-sm" id="rename-confirm-btn">Rename</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
