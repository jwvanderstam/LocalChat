[pytest]
# Pytest configuration for LocalChat

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, require services)
    slow: Slow tests (> 1 second)
    db: Tests requiring database
    ollama: Tests requiring Ollama service
    rag: Tests for RAG functionality
    api: Tests for API endpoints
    validation: Tests for input validation
    sanitization: Tests for input sanitization
    exceptions: Tests for exception classes

# Coverage options
[coverage:run]
source = .
relative_files = True
omit =
    */tests/*
    */venv/*
    */env/*
    */.venv/*
    */site-packages/*
    */__pycache__/*
    */migrations/*
    setup.py
    test_*.py
    conftest.py

[coverage:report]
precision = 2
relative_files = True
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
