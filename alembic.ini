[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Project root on sys.path so `from src import config` works in env.py
prepend_sys_path = .

# Truncate long revision slugs
truncate_slug_length = 40

# The database URL is constructed dynamically in env.py from src.config.
# Set this to a non-empty placeholder to satisfy alembic's parser.
sqlalchemy.url = postgresql+psycopg://placeholder/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
