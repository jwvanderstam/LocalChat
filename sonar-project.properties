# SonarCloud project configuration
# https://sonarcloud.io

sonar.projectKey=jwvanderstam_LocalChat
sonar.organization=jwvanderstam
sonar.projectName=LocalChat
sonar.projectVersion=0.4.0

# Source and test paths
sonar.sources=src
sonar.tests=tests

# Python version
sonar.python.version=3.10,3.11,3.12

# Coverage report (generated by pytest --cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions - non-application code
sonar.exclusions=\
  static/**,\
  templates/**,\
  scripts/**,\
  uploads/**,\
  htmlcov/**,\
  env/**,\
  .venv/**

# Test exclusions from main source analysis
sonar.coverage.exclusions=\
  tests/**,\
  scripts/**,\
  app.py

# Encoding
sonar.sourceEncoding=UTF-8
