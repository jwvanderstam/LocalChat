# SonarCloud project configuration
# https://sonarcloud.io

sonar.projectKey=jwvanderstam_LocalChat
sonar.organization=jwvanderstam
sonar.projectName=LocalChat
sonar.projectVersion=1.0.0

# Source and test paths
sonar.sources=src
sonar.tests=tests

# Python version
sonar.python.version=3.12

# Coverage report (generated by pytest --cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions - non-application code and vendored third-party assets
sonar.exclusions=\
  static/css/bootstrap.min.css,\
  static/css/bootstrap-icons.css,\
  static/css/fonts/**,\
  static/js/bootstrap.bundle.min.js,\
  templates/**,\
  uploads/**,\
  htmlcov/**,\
  env/**,\
  .venv/**

# Test exclusions from main source analysis
sonar.coverage.exclusions=\
  tests/**,\
  app.py

# Encoding
sonar.sourceEncoding=UTF-8
