name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  # Shared across both jobs — keeps env vars DRY
  PG_HOST: localhost
  PG_PORT: 5432
  PG_USER: postgres
  PG_PASSWORD: ci_test_password
  PG_DB: rag_db
  SECRET_KEY: ci-test-secret-key-32chars-minimum
  JWT_SECRET_KEY: ci-test-jwt-secret-key
  ADMIN_PASSWORD: ci-test-admin-password
  OLLAMA_BASE_URL: http://localhost:11434
  APP_ENV: development

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Security scan (bandit)
        run: |
          pip install bandit
          bandit -r src/ -ll -q -c pyproject.toml

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short -x

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests  # skip if unit tests already fail

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: rag_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: pytest tests/integration/ -m "not ollama" -v --tb=short

  repo-hygiene:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # needed for commit-message range check

      - name: No Flask imports in src/
        run: |
          if git grep -El "import flask|from flask" -- src/ 2>/dev/null; then
            echo "::error::Flask imports found in src/ — all application code must use FastAPI"
            exit 1
          fi
          echo "OK: no Flask imports in src/"

      - name: No tracked files matching .gitignore
        run: |
          tracked=$(git ls-files --ignored --cached --exclude-standard)
          if [ -n "$tracked" ]; then
            echo "::error::These tracked files match .gitignore patterns:"
            echo "$tracked"
            exit 1
          fi
          echo "OK: no tracked files in .gitignore"

      - name: No disallowed files
        run: |
          bad=$(git ls-files | grep -E '(\.DS_Store|Thumbs\.db|\.bak$|\.swp$)' || true)
          if [ -n "$bad" ]; then
            echo "::error::Disallowed files found:"
            echo "$bad"
            exit 1
          fi
          echo "OK: no disallowed files"

      - name: Conventional Commits check (warning only)
        if: github.event_name == 'pull_request'
        run: |
          git log --format="%s" "origin/${{ github.base_ref }}..HEAD" | while read -r msg; do
            if [ -n "$msg" ] && ! echo "$msg" | grep -qE '^(feat|fix|docs|chore|refactor|test|style|ci|perf|build)(\(.+\))?(!)?:'; then
              echo "::warning::Commit does not match Conventional Commits: $msg"
            fi
          done
