---
# LocalChat — Kubernetes Secret stub
#
# IMPORTANT: Never commit real values to version control.
# Populate this file locally, use Sealed Secrets, or reference an
# external secret store (Vault, AWS Secrets Manager, etc.).
#
# Create the secret:
#   kubectl create secret generic localchat-secrets \
#     --from-literal=SECRET_KEY="$(openssl rand -hex 32)" \
#     --from-literal=JWT_SECRET_KEY="$(openssl rand -hex 32)" \
#     --from-literal=ADMIN_PASSWORD="<strong-password>" \
#     --from-literal=PG_PASSWORD="<db-password>" \
#     --from-literal=METRICS_TOKEN="$(openssl rand -hex 16)"
apiVersion: v1
kind: Secret
metadata:
  name: localchat-secrets
  labels:
    app: localchat
type: Opaque
stringData:
  SECRET_KEY:      "REPLACE_ME"
  JWT_SECRET_KEY:  "REPLACE_ME"
  ADMIN_PASSWORD:  "REPLACE_ME"
  PG_PASSWORD:     "REPLACE_ME"
  METRICS_TOKEN:   "REPLACE_ME"
