---
# Nginx Ingress for LocalChat
# Requires cert-manager for TLS certificate issuance.
# Adjust the host and issuer annotation for your environment.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: localchat
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
spec:
  ingressClassName: nginx
  tLS:
    - hosts:
        - chat.example.com      # ← replace with your domain
      secretName: localchat-tls
  rules:
    - host: chat.example.com    # ← replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: localchat
                port:
                  name: http
