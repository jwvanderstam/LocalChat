---
# LocalChat application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localchat
  labels:
    app: localchat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: localchat
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: localchat
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: localchat
          image: localchat:latest    # replace with your registry path
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: localchat-config
            - secretRef:
                name: localchat-secrets
          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: uploads
          emptyDir: {}        # replace with a PVC for persistent uploads
        - name: logs
          emptyDir: {}
---
# LocalChat Service (ClusterIP — expose via Ingress)
apiVersion: v1
kind: Service
metadata:
  name: localchat
  labels:
    app: localchat
spec:
  selector:
    app: localchat
  ports:
    - port: 80
      targetPort: 5000
      name: http
  type: ClusterIP
---
# Horizontal Pod Autoscaler (scale 2–6 pods on CPU)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: localchat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: localchat
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
