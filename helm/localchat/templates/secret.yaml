apiVersion: v1
kind: Secret
metadata:
  name: {{ include "localchat.fullname" . }}-secret
  labels:
    {{- include "localchat.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Set these via --set or a values override file; never commit real secrets.
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | default "" | quote }}
  # Application secrets — override via values or external secret manager
  SECRET_KEY: ""
  ADMIN_PASSWORD: ""
  TOKEN_ENCRYPTION_KEY: ""
  MICROSOFT_CLIENT_ID: ""
  MICROSOFT_CLIENT_SECRET: ""
