apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "localchat.fullname" . }}-config
  labels:
    {{- include "localchat.labels" . | nindent 4 }}
data:
  DATABASE_URL: "postgresql://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ include "localchat.postgresHost" . }}:{{ .Values.postgresql.external.port | default 5432 }}/{{ .Values.postgresql.auth.database }}"
  REDIS_HOST: {{ include "localchat.redisHost" . | quote }}
  OLLAMA_BASE_URL: {{ .Values.ollama.external.baseUrl | quote }}
  {{- range $key, $val := .Values.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
